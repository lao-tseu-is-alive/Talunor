name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test (cgo)
    runs-on: ubuntu-latest
    env:
      # Talunor is cgo (mattn/go-sqlite3 + the loadable extensions).
      CGO_ENABLED: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history + tags: lessons-check verifies the git tags that historical
          # course lessons pin to, which a shallow clone would not have.
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Single source of truth: the version required in go.mod.
          go-version-file: go.mod
      - run: go version

      # The two SQLite extensions and the GGUF model are fetched, not vendored.
      # Cache them across runs, keyed on the versions pinned in the Makefile.
      - name: Cache fetched extensions + model
        uses: actions/cache@v4
        with:
          path: ext
          key: talunor-ext-${{ hashFiles('Makefile') }}

      - name: Fetch extensions + embedding model
        run: make deps

      # release-check is the canonical pre-tag gate: gofmt + vet + tests, plus the
      # drift guards (fetch targets, checksums, atlas-check, readme-check,
      # lessons-check). Running it here means a PR that breaks formatting or lets
      # the docs/atlas/lessons drift fails CI, not just a local pre-tag run.
      - name: Release guards (gofmt + vet + tests + drift alarms)
        run: make release-check

      # The race detector isn't part of release-check (it changes the test build);
      # run it separately so data races surface in CI.
      - name: Test with the race detector
        run: go test -race ./...
